# Log rotation for Luna English CRM cron jobs.
# Cron jobs run under the deploy user (not root) and append to these logs.
# 'su root <deploy_user>' lets logrotate rotate root-owned /var/log/luna-crm/
# while re-creating new files owned by <deploy_user> so cron can write to them.
#
# Replace <deploy_user> with the actual OS user that runs cron (e.g. ubuntu, deploy).
# Install: sudo cp deploy/logrotate-luna-crm.conf /etc/logrotate.d/luna-crm
#          sudo sed -i 's/<deploy_user>/ubuntu/g' /etc/logrotate.d/luna-crm

/var/log/luna-crm/*.log {
    weekly
    rotate 4
    compress
    delaycompress
    missingok
    notifempty
    su root <deploy_user>
    create 640 <deploy_user> <deploy_user>
}
