services:
  luna-crm:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
    container_name: luna-crm
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"
    env_file:
      - .env.production
    mem_limit: 512m
    healthcheck:
      test: [ "CMD", "node", "-e", "fetch('http://localhost:3000/login').then(r=>{process.exit(r.ok||r.status===307?0:1)}).catch(()=>process.exit(1))" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
  caddy:
    image: caddy:2-alpine
    container_name: caddy
    restart: unless-stopped
    ports:
      - "127.0.0.1:80:80"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    mem_limit: 64m
    depends_on:
      luna-crm:
        condition: service_healthy
volumes:
  caddy_data:
    driver: local
  caddy_config:
    driver: local
